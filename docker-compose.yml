services:
  db:
    image: postgres:16
    container_name: campus_bites_db
    environment:
      POSTGRES_DB: campus_bites
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - campus_bites_data:/var/lib/postgresql/data
      - ./data:/data:ro

volumes:
  campus_bites_data:
